<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor | Fylo data storage component</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap"
    />
    <meta name="author" content="Flavio Rios" />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <main id="main-content">
      <section>
        <img src="./assets/images/logo.svg" alt="Fylo" />
        <div role="group" aria-label="Acciones de archivo">
          <button aria-label="Nuevo documento">
            <img src="./assets/images/icon-document.svg" alt="" />
          </button>
          <button aria-label="Carpeta">
            <img src="./assets/images/icon-folder.svg" alt="" />
          </button>
          <button aria-label="Subir archivo">
            <img src="./assets/images/icon-upload.svg" alt="" />
          </button>
        </div>
      </section>
      <div>
        <p id="storage-label">You’ve used <strong>815 GB</strong> of your storage</p>
        <div><strong>185</strong> <span>GB Left</span></div>
        <meter value="815" max="1000" aria-labelledby="storage-label"></meter>
        <div>
          <span aria-hidden="true">0 GB</span>
          <span aria-hidden="true">1000 GB</span>
        </div>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a href="https://www.linkedin.com/in/flavio-rios-nieto/">Flavio Rios</a>.
    </footer>
  </body>
</html>
